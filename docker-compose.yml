# Development configuration — source is mounted for live reload.
# For production: remove the volume mount and the --reload flag,
# and set ANTHROPIC_API_KEY via a secrets manager rather than .env.
services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app   # live reload; remove for prod
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
